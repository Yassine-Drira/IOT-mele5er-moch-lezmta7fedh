<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-SQL VIP Pro — Révision Interactive</title>
<meta name="description" content="Plateforme de révision interactive : T-SQL, Index, Vues, Triggers, Transactions">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--panel:#18181b;--border:rgba(255,255,255,0.06);
  --accent:#3b82f6;--accent2:#93c5fd;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
  --txt:#fafafa;--txt2:#b5b5c3;
  --font:'Sora',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh;position:relative;z-index:0}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at top,rgba(59,130,246,.06) 0%,transparent 50%);z-index:-1;pointer-events:none}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(59,130,246,0.5)}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
#scroll-prog{position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:9999;transition:width .1s;pointer-events:none}
nav{position:sticky;top:0;z-index:1000;background:rgba(9,9,11,0.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center}
.nav-brand{padding:0 16px;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;border-right:1px solid var(--border);letter-spacing:.5px;height:48px;display:flex;align-items:center}
.nav-tabs{display:flex;flex:1;overflow-x:auto}
.tab-btn{padding:0 14px;height:48px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--txt);background:rgba(59,130,246,.07)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:6px;padding:0 8px;border-left:1px solid var(--border)}
#search-box{background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:6px;font-family:var(--font);font-size:13px;width:150px;transition:border .2s}
#search-box:focus{outline:none;border-color:var(--accent)}
#search-box::placeholder{color:var(--txt2)}
main{max-width:1180px;margin:0 auto;padding:24px 16px}
.tab-panel{display:none;animation:fi .22s ease}
.tab-panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat .v{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:11px;color:var(--txt2);margin-top:3px}
.prog-wrap{background:var(--border);border-radius:4px;height:5px;margin-top:6px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.sec-title{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:600}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag-rmi{background:rgba(96,165,250,.15);color:var(--accent2)}
.tag-rest{background:rgba(167,139,250,.15);color:#c4b5fd}
.tag-kafka{background:rgba(251,191,36,.15);color:#fbbf24}
.tag-rpc{background:rgba(52,211,153,.15);color:#34d399}
.tag-adv{background:rgba(251,113,133,.15);color:#fb7185}
.tag-easy{background:rgba(34,197,94,.15);color:var(--ok)}
.tag-med{background:rgba(245,158,11,.15);color:var(--warn)}
.tag-hard{background:rgba(239,68,68,.15);color:var(--err)}
.tag-intro{background:rgba(236,72,153,.15);color:#f472b6}
.tag-sockets{background:rgba(6,182,212,.15);color:#22d3ee}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;text-decoration:none}
.btn-p{background:var(--accent);color:#fff;box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 2px 8px rgba(59,130,246,0.2)}.btn-p:hover{background:#2563eb;box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 4px 14px rgba(59,130,246,0.4);transform:translateY(-1px)}
.btn-s{background:var(--panel);border:1px solid var(--border);color:var(--txt2)}.btn-s:hover{border-color:var(--accent);color:var(--txt)}
.btn-ok{background:rgba(34,197,94,.15);border:1px solid var(--ok);color:var(--ok)}
.btn-err{background:rgba(239,68,68,.15);border:1px solid var(--err);color:var(--err)}
.btn-warn{background:rgba(245,158,11,.15);border:1px solid var(--warn);color:var(--warn)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:all .3s ease}
.card:hover{border-color:rgba(59,130,246,.3);box-shadow:0 8px 30px rgba(0,0,0,.4);transform:translateY(-2px)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--txt2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.f-btn:hover,.f-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.hl{background:rgba(245,158,11,.3);color:var(--warn);border-radius:2px;padding:0 2px}
pre,code{font-family:var(--mono)}
pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.6;white-space:pre}
code{background:rgba(59,130,246,.12);padding:1px 5px;border-radius:3px;color:var(--accent2);font-size:13px}
.kw{color:#60a5fa;font-weight:600}.str{color:#86efac}.cmt{color:#6b7280;font-style:italic}.num{color:#fb923c}.cls{color:#fde68a}
.opt-btn{width:100%;text-align:left;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);cursor:pointer;font-family:var(--font);font-size:14px;transition:all .2s;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px}
.opt-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:var(--ok)!important;background:rgba(34,197,94,.1);color:var(--ok);animation:correctPop .3s ease}
.opt-btn.wrong{border-color:var(--err)!important;background:rgba(239,68,68,.1);color:var(--err);animation:wrongShake .35s ease}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.01)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.opt-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.opt-badge.ok{background:rgba(34,197,94,.2);color:var(--ok)}
.opt-badge.bad{background:rgba(239,68,68,.2);color:var(--err)}
.expl{margin-top:12px;padding:12px;background:rgba(59,130,246,.08);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:13px;color:var(--txt2);display:none}
.expl.show{display:block}
.trap-note{margin-top:8px;padding:9px;background:rgba(245,158,11,.08);border-left:3px solid var(--warn);border-radius:0 6px 6px 0;font-size:12px;color:var(--warn);display:none}
.trap-note.show{display:block}
.q-nav{display:flex;flex-wrap:wrap;gap:5px;margin:14px 0}
.qn-btn{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:700;transition:all .2s}
.qn-btn.cur{border-color:var(--accent);background:rgba(59,130,246,.2);color:var(--accent)}
.qn-btn.ans{border-color:var(--ok);background:rgba(34,197,94,.15);color:var(--ok)}
.qn-btn.bad{border-color:var(--err);background:rgba(239,68,68,.15);color:var(--err)}
.qn-btn.skip{border-color:var(--warn);background:rgba(245,158,11,.15);color:var(--warn)}
.qn-btn.bk{border-color:var(--accent2)}
.timer{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--warn);padding:5px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
.timer.red{color:var(--err)}
.fc-arena{display:flex;justify-content:center;perspective:1200px;margin:20px 0;min-height:300px;align-items:center}
.flashcard{width:100%;max-width:680px;height:280px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--panel)}
.fc-back{background:#0f172a;transform:rotateY(180deg)}
.fc-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px}
.fc-txt{font-size:15px;font-weight:500;line-height:1.6}
.fc-code{font-family:var(--mono);font-size:12px;background:var(--bg);padding:8px 12px;border-radius:5px;border:1px solid var(--border);margin-top:8px;text-align:left;width:100%}
.fc-status{display:flex;justify-content:center;gap:8px;margin-top:14px}
.fcs-btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;transition:all .2s}
.fcs-review{background:rgba(239,68,68,.15);border:1px solid var(--err);color:var(--err)}
.fcs-med{background:rgba(245,158,11,.15);border:1px solid var(--warn);color:var(--warn)}
.fcs-ok{background:rgba(34,197,94,.15);border:1px solid var(--ok);color:var(--ok)}
.cheat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.cc{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;break-inside:avoid}
.cc-h{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cc-h h3{font-size:13px;font-weight:700;color:var(--accent2)}
.copy-btn{padding:3px 9px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--txt2);cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .2s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.cc-b{padding:12px 14px;font-size:13px}
.ci{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(35,40,56,.5);gap:10px;align-items:flex-start}
.ci:last-child{border-bottom:none}
.ci-k{color:var(--txt2);font-size:12px;max-width:140px;flex-shrink:0}
.ci-v{font-family:var(--mono);font-size:12px;color:var(--txt);text-align:right}
.ci-v.ac{color:var(--accent2)}
.cs{font-family:var(--mono);font-size:12px;padding:8px;background:var(--bg);border-radius:4px;border:1px solid var(--border);margin-top:6px;overflow-x:auto;white-space:pre;display:block}

/* Exercices Styles */
textarea.code-area{width:100%;min-height:110px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-family:var(--mono);font-size:13px;padding:10px;resize:vertical;transition:border .2s}
textarea.code-area:focus{outline:none;border-color:var(--accent)}
.exo-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden;transition:all .3s ease;}
.exo-card:hover{border-color:rgba(59,130,246,.3);box-shadow:0 8px 30px rgba(0,0,0,.4);}
.exo-header{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.exo-num{font-size:11px;font-family:var(--mono);color:var(--txt2);text-transform:uppercase;letter-spacing:0.1em}
.exo-title{font-size:14px;font-weight:700;color:var(--accent2)}
.exo-body{padding:14px}
.exo-desc{font-size:13px;color:var(--txt);line-height:1.6;margin-bottom:10px}
.exo-schema{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:var(--mono);font-size:12px;color:var(--txt2);margin-bottom:10px;white-space:pre;overflow-x:auto}
.exo-task{background:rgba(245,158,11,.08);border-left:3px solid var(--warn);border-radius:0 6px 6px 0;padding:8px 10px;font-size:13px;color:var(--warn);margin-bottom:10px}
.solution-box{display:none;margin-top:10px;background:var(--bg);border:1px solid var(--ok);border-radius:6px;overflow:hidden}
.solution-box.show{display:block}
.solution-header{padding:6px 10px;background:rgba(34,197,94,.15);font-size:11px;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:0.1em}
.solution-code{padding:10px;font-family:var(--mono);font-size:12px;color:var(--txt2);white-space:pre;overflow-x:auto}
.solution-note{padding:8px 10px;background:var(--panel);border-top:1px solid var(--border);font-size:12px;color:var(--txt2);line-height:1.5}
.exo-actions{display:flex;gap:8px;margin-top:10px}

.collapsible{overflow:hidden;max-height:0;transition:max-height .4s ease}
.collapsible.open{max-height:3000px}
.coll-btn{display:flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;margin-top:9px;width:auto}
.coll-btn:hover{border-color:var(--accent);color:var(--accent2)}
.coll-btn .arr{transition:transform .3s}
.coll-btn.open .arr{transform:rotate(90deg)}
.jump-idx{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;margin-bottom:18px}
.j-link{color:var(--accent2);font-size:12px;cursor:pointer;padding:2px 7px;border-radius:4px;transition:background .2s;background:none;border:none;font-family:var(--font)}
.j-link:hover{background:rgba(59,130,246,.15)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;place-items:center}
.modal-ov.open{display:grid}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px;max-width:620px;width:90%;max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.r-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:16px 0}
.r-card{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:14px;text-align:center}
.r-card .big{font-size:34px;font-weight:800}
.big.good{color:var(--ok)}.big.mid{color:var(--warn)}.big.bad{color:var(--err)}
.hamburger{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;padding:0 14px;height:48px}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:950;display:none;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}
@media(max-width:850px){nav{flex-wrap:wrap;padding:4px 0}.hamburger{display:block}.nav-brand{border-right:none;padding-left:0;flex:1}.nav-right{width:100%;border-left:none;border-top:1px solid var(--border);padding:8px 16px;justify-content:space-between;margin-top:4px;flex-wrap:wrap;gap:8px}.kbd-btn{display:none}.nav-tabs{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--panel);border-right:1px solid var(--border);border-top:none;flex-direction:column;z-index:1000;transition:left .3s cubic-bezier(.4,0,.2,1);padding-top:20px;overflow-y:auto;align-items:stretch}.nav-tabs.open{left:0}.tab-btn{width:100%;text-align:left;border-bottom:none;border-left:3px solid transparent;padding:15px 20px;height:auto;font-size:14px}.tab-btn.active{border-bottom:none;border-left-color:var(--accent);background:rgba(59,130,246,.07)}.flashcard{height:240px}.fc-txt{font-size:13px}main{padding:14px 10px}#search-box{flex:1;max-width:none;order:3;margin-left:0}#streak-counter{order:1}#session-clock{order:2}.qn-btn{width:38px;height:38px;font-size:14px}.f-btn{padding:8px 16px;font-size:13px}.btn{min-height:40px}.yd-credit{display:none}.toast{bottom:90px}}
@media print{nav,#scroll-prog,.f-btn,.filter-bar,.btn,.fc-status,.q-nav,.coll-btn,textarea{display:none!important}body{background:#fff;color:#000}.cc{break-inside:avoid;border:1px solid #ccc}.cc-h{background:#f3f4f6}pre,.cs,code{background:#f9fafb;border:1px solid #ddd}}
.empty{text-align:center;padding:60px 24px;background:rgba(59,130,246,.03);border:1px solid rgba(59,130,246,.1);border-radius:16px;margin-top:16px;animation:fi .22s ease}
.empty-icon{font-size:48px;display:block;margin-bottom:16px;line-height:1;opacity:0.8}
.empty-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--txt2);line-height:1.6}
#session-clock{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--txt2);padding:4px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;white-space:nowrap;letter-spacing:.5px}
#session-clock.active{color:var(--accent);border-color:rgba(59,130,246,.4)}
.kbd-btn{padding:5px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt2);cursor:pointer;font-size:14px;line-height:1;transition:all .2s}
.kbd-btn:hover{border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;bottom:80px;right:24px;background:var(--ok);color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;font-size:13px;box-shadow:0 10px 25px rgba(0,0,0,.5);transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);z-index:9999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.yd-credit{position:fixed;bottom:24px;right:24px;display:flex;align-items:center;background:rgba(24,24,27,.8);backdrop-filter:blur(12px);border:1px solid rgba(59,130,246,.2);border-radius:30px;padding:8px 14px;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:900;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.yd-credit:hover{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.5);box-shadow:0 4px 20px rgba(59,130,246,.2);padding-right:20px}
.yd-monogram{font-family:var(--font);font-weight:700;font-size:12px;color:var(--accent);letter-spacing:1px}
.yd-full{font-family:var(--font);font-size:12px;color:var(--accent2);white-space:nowrap;max-width:0;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden}
.yd-credit:hover .yd-full{max-width:200px;opacity:1;margin-left:10px}
.kb-table{width:100%;border-collapse:collapse;font-size:13px}
.kb-table tr{border-bottom:1px solid var(--border)}
.kb-table tr:last-child{border-bottom:none}
.kb-table td{padding:8px 4px}
.kb-table td:first-child{color:var(--txt2)}
.kb-table td:last-child{text-align:right;white-space:nowrap}
kbd{display:inline-block;background:var(--bg);border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:11px;color:var(--txt2)}

@keyframes pulseGlow {
  0% { transform: scale(0.95); box-shadow: 0 0 30px rgba(59,130,246,0.4); }
  100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(139,92,246,0.8); }
}
@keyframes slideUpEntrance {
  0% { opacity: 0; transform: translateY(40px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
body.loaded nav { animation: slideUpEntrance 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }
body.loaded main { animation: slideUpEntrance 0.8s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }

<script>
/* === DATA === */ // v2: upgraded QCMs + multi-select + full MD coverage
const Q = [
  {id:1, ch:'Index', diff:'hard', q:'Un index CLUSTERED est créé automatiquement sur une table. Quelle en est la cause la plus probable ?', opts:['La table contient plus de 1000 lignes','Une PRIMARY KEY a été définie','Un UNIQUE CONSTRAINT a été ajouté','La table est un heap'], ans:1, expl:'SQL Server crée automatiquement un index CLUSTERED quand une PRIMARY KEY est définie. Sans PK, la table reste un heap.', trap:''},
  {id:2, ch:'Index', diff:'hard', q:'Fragmentation à 25%. Quelle action choisir ?', opts:['REBUILD — plus sûr','REORGANIZE — adapté à ce niveau','Aucune action nécessaire','DROP et recréer l\'index'], ans:1, expl:'< 30% → REORGANIZE (online, léger, agit sur les feuilles). > 30% → REBUILD (complet, peut bloquer la table).', trap:''},
  {id:3, ch:'Index', diff:'hard', q:'Colonnes dans INCLUDE d\'un index couvrant : lesquelles sont VRAIES ? (plusieurs réponses)', opts:['Elles sont triées dans l\'index','Stockées uniquement dans les feuilles','Évitent le lookup vers la table','Elles font partie de la clé de l\'index'], ans:[1,2], multi:true, expl:'INCLUDE : stockées dans les feuilles SEULEMENT, non triées, non clés. Cela évite le Key Lookup vers la table de base.', trap:''},
  {id:4, ch:'Index', diff:'hard', q:'Table AVEC clustered index. Que stocke le pointeur d\'un index Non-Clustered ?', opts:['L\'adresse physique RID','La clé clusterisée','L\'ID de la page de données','Le numéro de ligne dans la page'], ans:1, expl:'Sur une table avec clustered index : le Non-Clustered stocke la clé clusterisée. Sur un heap : il stocke l\'adresse physique (RID).', trap:''},
  {id:5, ch:'Index', diff:'hard', q:'Un Page Split se produit. Quelle est la conséquence directe ?', opts:['L\'index est supprimé puis recréé','Les données sont déplacées vers une nouvelle page et la fragmentation augmente','La table est verrouillée définitivement','SQL Server choisit un Full Scan automatiquement'], ans:1, expl:'Page Split : page pleine → SQL crée une nouvelle page et déplace des données → augmente la fragmentation externe.', trap:''},
  {id:6, ch:'Index', diff:'med', q:'Taille d\'une page de stockage SQL Server ?', opts:['4 Ko','16 Ko','8 Ko','64 Ko'], ans:2, expl:'Une page SQL Server = 8 Ko. C\'est l\'unité atomique de lecture/écriture sur le disque.', trap:''},
  {id:7, ch:'Index', diff:'hard', q:'Lequel décrit "Fragmentation Externe" (Externally Fragmented) ?', opts:['Pages vides dans l\'index','Ordre logique des données ≠ ordre physique sur disque','Index avec trop de colonnes INCLUDE','Fillfactor réglé à 100%'], ans:1, expl:'Externe = ordre logique ≠ ordre physique → SQL doit sauter entre pages non contiguës → lenteur. Interne = espaces vides dans les pages.', trap:''},
  {id:8, ch:'Index', diff:'hard', q:'REORGANIZE vs REBUILD — lesquels sont corrects ? (plusieurs réponses)', opts:['REORGANIZE est multi-thread','REBUILD peut changer le Fillfactor','REORGANIZE est online (pas de blocage)','REBUILD agit seulement sur les feuilles'], ans:[1,2], multi:true, expl:'REBUILD : multi-thread, change le fillfactor, peut bloquer. REORGANIZE : 1 thread, online, garde le fillfactor, agit sur les feuilles.', trap:''},
  {id:9, ch:'Vues', diff:'hard', q:'WITH SCHEMABINDING sur une vue : quel est l\'effet sur la table sous-jacente ?', opts:['La table devient en lecture seule','La structure de la table ne peut plus être modifiée tant que la vue existe','La table est automatiquement sauvegardée','Les INSERT sur la table sont bloqués'], ans:1, expl:'SCHEMABINDING lie la vue au schéma des tables. ALTER TABLE ou DROP TABLE sur les tables référencées sera refusé tant que la vue existe.', trap:''},
  {id:10, ch:'Vues', diff:'hard', q:'Lors de l\'exécution de SELECT col FROM t WHERE x=1 GROUP BY col ORDER BY col, dans quel ordre SQL Server traite-t-il les clauses ?', opts:['WHERE → GROUP BY → SELECT → ORDER BY','FROM → WHERE → GROUP BY → SELECT → ORDER BY','SELECT → FROM → WHERE → GROUP BY','GROUP BY → WHERE → SELECT → FROM'], ans:1, expl:'FROM → (JOIN) → WHERE → GROUP BY → HAVING → SELECT → DISTINCT → ORDER BY → TOP. Le FROM est TOUJOURS en premier.', trap:''},
  {id:11, ch:'Vues', diff:'hard', q:'Quelles conditions permettent un INSERT direct sur une vue ? (plusieurs réponses)', opts:['Vue basée sur une seule table','Pas de colonnes calculées','Vue contient un GROUP BY','Chaque colonne de la vue mappe exactement une colonne de base'], ans:[0,1,3], multi:true, expl:'INSERT sur vue : 1 seule table, pas de colonnes calculées/DISTINCT/GROUP BY, mapping 1-1 entre colonnes de la vue et colonnes de la table.', trap:''},
  {id:12, ch:'Vues', diff:'hard', q:'WITH CHECK OPTION est défini. Un INSERT sur la vue est exécuté avec une valeur violant le WHERE. Que se passe-t-il ?', opts:['L\'INSERT réussit mais la ligne n\'est pas visible via la vue','L\'INSERT échoue avec une erreur','La vue est automatiquement mise à jour','La ligne est insérée dans une table temporaire'], ans:1, expl:'WITH CHECK OPTION : toute opération DML violant la clause WHERE de la vue est REJETÉE avec erreur. La ligne n\'est pas insérée.', trap:''},
  {id:13, ch:'Vues', diff:'hard', q:'Vue indexée créée avec WITH SCHEMABINDING. Quelles sont ses contraintes ? (plusieurs réponses)', opts:['Pas de DISTINCT','Pas de GROUP BY','Pas de UNION','Pas de jointures entre tables'], ans:[0,1,2], multi:true, expl:'Vue indexée interdit : DISTINCT, GROUP BY, UNION. Les jointures sont AUTORISÉES tant que SCHEMABINDING est utilisé.', trap:'Un piège classique : les jointures sont permises dans les vues indexées !'},
  {id:14, ch:'Vues', diff:'hard', q:'Quelle syntaxe T-SQL empêche un utilisateur de supprimer des lignes via une vue ?', opts:['ALTER VIEW SET READONLY','DENY DELETE ON Vue_Nom TO User_Name','WITH CHECK OPTION','DROP PERMISSION DELETE ON vue'], ans:1, expl:'DENY DELETE ON Vue_Nom TO User_Name révoque la permission de suppression sur la vue pour cet utilisateur.', trap:''},
  {id:15, ch:'Triggers', diff:'hard', q:'INSTEAD OF vs AFTER : lequel est VRAI ?', opts:['AFTER remplace l\'opération DML','INSTEAD OF s\'exécute après l\'opération','AFTER s\'exécute après, INSTEAD OF remplace l\'opération','Ils sont identiques, juste différents noms'], ans:2, expl:'AFTER : s\'exécute APRÈS que la modification soit faite. INSTEAD OF : SQL Server exécute le trigger AU LIEU de l\'opération DML originale.', trap:''},
  {id:16, ch:'Triggers', diff:'hard', q:'Trigger AFTER UPDATE sur Employes. Quelle table contient les valeurs AVANT modification ?', opts:['INSERTED','UPDATED','DELETED','OLD'], ans:2, expl:'UPDATE → INSERTED = nouvelles valeurs, DELETED = anciennes valeurs. Il n\'y a pas de table UPDATED ou OLD en T-SQL.', trap:''},
  {id:17, ch:'Triggers', diff:'hard', q:'EVENTDATA() dans un trigger DDL. Quel est le type de retour ?', opts:['NVARCHAR(MAX)','VARCHAR(4000)','XML','JSON'], ans:2, expl:'EVENTDATA() retourne un type XML avec la structure EVENT_INSTANCE contenant EventType, ObjectName, PostTime, LoginName.', trap:''},
  {id:18, ch:'Triggers', diff:'hard', q:'RAISERROR sévérité 15 dans un trigger AFTER INSERT. L\'INSERT a-t-il été appliqué ?', opts:['Non — rollback automatique','Oui — sévérité < 19, l\'action reste','Oui mais la transaction est suspendue','Non — tout trigger AFTER annule l\'action'], ans:1, expl:'Sévérité < 19 dans un trigger AFTER : l\'opération DML reste validée. Seule une sévérité ≥ 19 déclenche un rollback automatique.', trap:''},
  {id:19, ch:'Triggers', diff:'hard', q:'Quels événements peuvent déclencher un trigger DDL ? (plusieurs réponses)', opts:['INSERT INTO une table','CREATE_TABLE','DROP_TABLE','ALTER_TABLE'], ans:[1,2,3], multi:true, expl:'Les triggers DDL réagissent aux événements de STRUCTURE : CREATE_TABLE, ALTER_TABLE, DROP_TABLE. INSERT/UPDATE/DELETE sont des événements DML.', trap:''},
  {id:20, ch:'Triggers', diff:'hard', q:'Un trigger AFTER INSERT sur Salles fait INSERT INTO Salles. Que se passe-t-il ?', opts:['Rien — SQL Server ignore la récursion','Boucle récursive jusqu\'à la limite (32 niveaux) puis erreur','L\'INSERT interne est ignoré silencieusement','Erreur de compilation immédiate'], ans:1, expl:'Trigger récursif : le trigger se déclenche à nouveau à chaque INSERT interne. SQL Server limite à 32 niveaux de récursion puis lève une erreur fatale.', trap:'C\'est exactement le bug dans la Question 5 de l\'examen Gestion des Salles !'},
  {id:21, ch:'Transactions', diff:'hard', q:'ACID — laquelle de ces propriétés garantit que T1 ne voit pas les modifications non-commitées de T2 ?', opts:['Atomicité','Durabilité','Cohérence','Isolation'], ans:3, expl:'Isolation : chaque transaction s\'exécute indépendamment. T1 ne voit pas les données modifiées par T2 tant que T2 n\'a pas commité.', trap:''},
  {id:22, ch:'Transactions', diff:'hard', q:'Sans SET XACT_ABORT ON, une erreur NON-fatale survient à la ligne 3 d\'une transaction. Que se passe-t-il ?', opts:['Rollback de toute la transaction','Seule la ligne 3 est annulée, le reste continue','Commit automatique des lignes 1-2','La transaction est suspendue jusqu\'à COMMIT manuel'], ans:1, expl:'Sans XACT_ABORT ON : l\'erreur est logguée, MAIS l\'exécution CONTINUE aux lignes suivantes → risque d\'état incohérent. Seule une erreur fatale cause un rollback.', trap:''},
  {id:23, ch:'Transactions', diff:'hard', q:'Deadlock. SQL Server tue la victime. Quel code d\'erreur la victime reçoit-elle ?', opts:['1205','8152','2601','50000'], ans:0, expl:'Erreur 1205 = deadlock victim. La transaction tuée reçoit cette erreur et doit être réessayée par l\'application.', trap:''},
  {id:24, ch:'Transactions', diff:'hard', q:'ROLLBACK TRANSACTION NomSave après un SAVE TRANSACTION NomSave. Que se passe-t-il ?', opts:['Toute la transaction est annulée','Seules les opérations depuis le savepoint sont annulées','La transaction est commitée jusqu\'au savepoint','Le savepoint est supprimé sans annulation'], ans:1, expl:'ROLLBACK TRANSACTION NomSave revient UNIQUEMENT au point de sauvegarde. Les opérations précédentes au savepoint restent dans la transaction.', trap:''},
  {id:25, ch:'Transactions', diff:'hard', q:'Quelles propriétés ACID sont garanties si SET XACT_ABORT ON est actif ? (plusieurs réponses)', opts:['Atomicité — rollback total dès erreur','Cohérence — contraintes toujours respectées','Isolation — visibilité des données contrôlée','Durabilité — commit persiste après panne'], ans:[0,1], multi:true, expl:'XACT_ABORT ON renforce l\'Atomicité (rollback total) et aide la Cohérence (pas de données partielles). Isolation et Durabilité sont gérées différemment.', trap:''},
  {id:26, ch:'Transactions', diff:'hard', q:'SET DEADLOCK_PRIORITY LOW est défini pour Trans1. Un deadlock survient. Que se passe-t-il ?', opts:['Trans1 attend indéfiniment','Trans1 est choisie comme victime en priorité','Trans2 est toujours tuée','Le deadlock est résolu automatiquement sans victime'], ans:1, expl:'DEADLOCK_PRIORITY LOW indique à SQL Server de préférer tuer cette transaction comme victime. LOW < NORMAL < HIGH.', trap:''},
  {id:27, ch:'Statistiques', diff:'hard', q:'Stats auto déclenchées lors d\'un SELECT. Quel % de lignes modifiées le déclenche ?', opts:['10%','30%','20%','50%'], ans:2, expl:'SQL Server met à jour les statistiques automatiquement quand 20% des lignes d\'une table ont été modifiées (INSERT/UPDATE/DELETE).', trap:''},
  {id:28, ch:'Statistiques', diff:'hard', q:'Requête retournant 60% des lignes d\'une table avec un index Non-Clustered disponible. Que choisit l\'optimiseur ?', opts:['Index Seek sur le Non-Clustered','Index Scan + Key Lookup','Full Table Scan (heap scan)','Création d\'un nouvel index temporaire'], ans:2, expl:'Si > 50% des lignes sont retournées, le coût d\'un index + lookup dépasse celui d\'un full scan. L\'optimiseur choisit le full scan.', trap:''},
  {id:29, ch:'Statistiques', diff:'hard', q:'Différences entre FULLSCAN et SAMPLE N PERCENT pour UPDATE STATISTICS ? (plusieurs réponses)', opts:['FULLSCAN est 100% précis','SAMPLE est plus rapide','FULLSCAN utilise l\'extrapolation','SAMPLE est moins précis sur les valeurs rares'], ans:[0,1,3], multi:true, expl:'FULLSCAN = lit toutes les lignes, précis à 100%, lent. SAMPLE = lit N% aléatoire, rapide, extrapolation → moins précis sur les valeurs peu fréquentes.', trap:''},
  {id:30, ch:'Statistiques', diff:'hard', q:'Index créé mais requêtes restent lentes. Laquelle N\'est PAS une cause probable ?', opts:['Stats obsolètes','Mauvaise colonne indexée','Trop d\'index sur la même table','Données recherchées > 50% de la table'], ans:2, expl:'Trop d\'index ralentit les INSERT/UPDATE/DELETE mais pas les SELECT. Les causes de SELECT lent malgré index : stats obsolètes, mauvaise colonne, > 50% données.', trap:''},
  {id:31, ch:'T-SQL', diff:'hard', q:'DECLARE @x INT; SET @x = 5; GO; SELECT @x. Résultat ?', opts:['5','NULL','Erreur — variable inconnue après GO','0'], ans:2, expl:'GO sépare les batches. Une variable déclarée AVANT GO n\'est PAS reconnue APRÈS GO. Chaque batch a son propre contexte.', trap:''},
  {id:32, ch:'T-SQL', diff:'hard', q:'Curseur Forward-Only. Quelle instruction FETCH est valide ?', opts:['FETCH PRIOR','FETCH FIRST','FETCH NEXT','FETCH LAST'], ans:2, expl:'Curseur Forward-Only (défaut) : seul FETCH NEXT est disponible. Pour FETCH PRIOR/FIRST/LAST, il faut déclarer CURSOR SCROLL FOR.', trap:''},
  {id:33, ch:'T-SQL', diff:'hard', q:'CLOSE vs DEALLOCATE sur un curseur — lesquels sont VRAIS ? (plusieurs réponses)', opts:['CLOSE libère définitivement la mémoire','DEALLOCATE libère la structure du curseur','CLOSE conserve la structure mais ferme le curseur','On peut OPEN après CLOSE'], ans:[1,2,3], multi:true, expl:'CLOSE = ferme le curseur mais garde la structure (on peut le rouvrir avec OPEN). DEALLOCATE = libère totalement la mémoire. Toujours faire les deux.', trap:''},
  {id:34, ch:'T-SQL', diff:'hard', q:'SELECT dbo.maFonction(5) vs EXEC dbo.maFonction 5. Lequel est correct pour une fonction scalaire ?', opts:['EXEC dbo.maFonction 5','SELECT dbo.maFonction(5)','Les deux sont équivalents','dbo. est optionnel pour les fonctions système'], ans:1, expl:'Les fonctions scalaires utilisateur s\'appellent avec SELECT dbo.nomFonction(). EXEC est réservé aux procédures stockées. dbo. est OBLIGATOIRE.', trap:''},
  {id:35, ch:'T-SQL', diff:'hard', q:'GO 5 est exécuté. Combien de fois le batch précédent s\'exécute ?', opts:['1 fois','6 fois','5 fois','GO ne répète pas'], ans:2, expl:'GO N répète le batch N fois. GO 5 = 5 exécutions du batch précédent. GO seul = 1 séparateur de batch sans répétition.', trap:''},
  {id:36, ch:'T-SQL', diff:'hard', q:'Fonction Table-Valued Inline vs Multi-Statement — lesquelles sont VRAIES ? (plusieurs réponses)', opts:['Inline = RETURNS TABLE, pas de BEGIN/END','Multi-Statement = RETURNS @var TABLE(...)','Inline est plus rapide (inline dans la requête)','Les deux peuvent modifier des données'], ans:[0,1,2], multi:true, expl:'Inline : RETURNS TABLE, corps = RETURN(SELECT...), optimisé. Multi-Statement : RETURNS @t TABLE(...), BEGIN/END, plusieurs instructions. Aucune ne peut modifier les données.', trap:''},
  {id:37, ch:'T-SQL', diff:'hard', q:'@@FETCH_STATUS = -1 dans une boucle curseur signifie :', opts:['Succès — ligne récupérée','La ligne est manquante (supprimée)','Fin du curseur — plus de lignes','Le curseur n\'est pas ouvert'], ans:2, expl:'@@FETCH_STATUS : 0 = succès, -1 = fin du curseur (plus de lignes), -2 = ligne manquante/supprimée. La boucle WHILE doit continuer SEULEMENT si = 0.', trap:''},
  {id:38, ch:'T-SQL', diff:'hard', q:'Procédure stockée. Quelles sont les 3 façons de retourner une valeur ? (plusieurs réponses)', opts:['Paramètre OUTPUT','RETURN (valeur entière de statut)','SELECT (jeu de résultats)','THROW'], ans:[0,1,2], multi:true, expl:'OUTPUT : paramètre en sortie (tout type). RETURN : entier de statut seulement. SELECT : retourne un resultset. THROW sert à lever des erreurs, pas à retourner des valeurs.', trap:''},
  {id:39, ch:'Index', diff:'hard', q:'Un index Non-Clustered ralentit certaines opérations. Lesquelles ? (plusieurs réponses)', opts:['SELECT sur la colonne indexée','INSERT dans la table','UPDATE de la colonne indexée','DELETE d\'une ligne de la table'], ans:[1,2,3], multi:true, expl:'Chaque index Non-Clustered doit être maintenu à chaque INSERT/UPDATE/DELETE → overhead. SELECT sur colonne indexée est au contraire ACCÉLÉRÉ.', trap:''},
  {id:40, ch:'Transactions', diff:'hard', q:'Dans ACID, "Cohérence" signifie :', opts:['La transaction ne peut pas être interrompue','T1 ne voit pas les données de T2 non-commitées','Les contraintes d\'intégrité sont respectées avant ET après la transaction','Les modifications persistent après un crash'], ans:2, expl:'Cohérence = les données passent d\'un état valide à un autre. FK, CHECK, UNIQUE etc. sont respectées. Ce n\'est pas l\'isolation (Isolation) ni la persistance (Durabilité).', trap:''},
  {id:41, ch:'T-SQL', diff:'hard', q:'CASE en T-SQL : forme "recherchée" (searched) vs forme "simple". Quelle est la différence ?', opts:['La forme simple compare des expressions, la recherchée évalue des conditions booléennes','Elles sont identiques, juste une syntaxe différente','La forme recherchée ne peut pas utiliser ELSE','La forme simple autorise les sous-requêtes'], ans:0, expl:'Simple : CASE expr WHEN val. Recherchée : CASE WHEN condition THEN. La forme recherchée est plus flexible (BETWEEN, IS NULL, comparaisons complexes).', trap:''},
  {id:42, ch:'T-SQL', diff:'hard', q:'Quelle est la différence entre VARCHAR(n) et NVARCHAR(n) ?', opts:['VARCHAR est Unicode, NVARCHAR ne l\'est pas','NVARCHAR stocke des caractères Unicode (2 octets/char), VARCHAR stocke en ASCII (1 octet/char)','Il n\'y a aucune différence','VARCHAR est plus lent'], ans:1, expl:'NVARCHAR = Unicode (arabe, asiatique, caractères spéciaux), 2 octets par caractère. VARCHAR = non-Unicode, 1 octet. NVARCHAR(100) = max 100 caractères Unicode.', trap:''},
  {id:43, ch:'Statistiques', diff:'hard', q:'WITH RECOMPILE dans une procédure stockée. Quand l\'utiliser ?', opts:['Pour accélérer toujours les requêtes','Quand les données ont beaucoup changé et le plan d\'exécution est devenu obsolète','Pour désactiver les statistiques','Pour forcer un index spécifique'], ans:1, expl:'WITH RECOMPILE force SQL Server à recalculer le plan d\'exécution à chaque appel. Utile quand les données changent souvent et que le plan mis en cache n\'est plus optimal.', trap:''},
  {id:44, ch:'Statistiques', diff:'hard', q:'Index Hint : SELECT * FROM EMP WITH(INDEX(idx_dept)). Quel est l\'effet ?', opts:['Force SQL Server à ignorer cet index','Force SQL Server à utiliser uniquement cet index pour cette requête','Recrée l\'index idx_dept','Met à jour les statistiques de idx_dept'], ans:1, expl:'WITH(INDEX(nom_index)) est un hint qui force l\'optimiseur à utiliser CET index spécifique, même si l\'optimiseur aurait choisi un plan différent.', trap:''},
  {id:45, ch:'Index', diff:'hard', q:'Qu\'est-ce qu\'un "Heap" en SQL Server ?', opts:['Un index clustered sans clé primaire','Une table sans aucun index clustered, lignes stockées sans ordre','Un type de fragmentation interne','Une structure B-Tree sans nœuds intermédiaires'], ans:1, expl:'Heap = table SANS index clustered. Les lignes sont insérées sans ordre dans des pages. Recherche = Table Scan complet. Insertion rapide, recherche lente.', trap:''}
];

const FC = [
  {id:101, ch:'Index', front:'Quelle est la structure de données utilisée par les index SQL Server ?', back:'Arbre B-Tree (Binary Tree). Complexité de recherche : O(log n).', code:''},
  {id:102, ch:'Index', front:'Différence entre REORGANIZE et REBUILD ?', back:'REORGANIZE : léger, online, feuilles uniquement, garde le fillfactor. REBUILD : complet, multi-thread, peut bloquer, permet de changer le fillfactor.', code:'ALTER INDEX idx ON table REORGANIZE;\nALTER INDEX idx ON table REBUILD;'},
  {id:103, ch:'Index', front:'Qu\'est-ce que la fragmentation interne vs externe ?', back:'Interne = espaces vides dans les pages (gaspillage mémoire). Externe = ordre logique ≠ ordre physique (SQL saute entre pages, lent).', code:''},
  {id:104, ch:'Index', front:'Syntaxe d\'un index couvrant avec INCLUDE ?', back:'INCLUDE stocke des colonnes supplémentaires dans les feuilles sans les trier. Évite le lookup vers la table.', code:'CREATE NONCLUSTERED INDEX idx_name\nON table (col_triee)\nINCLUDE (col1, col2);'},
  {id:105, ch:'Vues', front:'Quelle vue permet des opérations DML directes ?', back:'Vue simple : 1 seule table, pas de DISTINCT, GROUP BY, colonnes calculées, ou agrégats.', code:''},
  {id:106, ch:'Vues', front:'Comment créer une vue indexée (matérialisée) ?', back:'1. WITH SCHEMABINDING obligatoire. 2. Créer un index UNIQUE CLUSTERED. Données stockées physiquement, MAJ automatique.', code:'CREATE VIEW v WITH SCHEMABINDING AS\n  SELECT ...\nCREATE UNIQUE CLUSTERED INDEX idx ON v(col);'},
  {id:107, ch:'Vues', front:'Ordre d\'exécution SQL — de mémoire ?', back:'FROM → JOIN → ON → WHERE → GROUP BY → HAVING → SELECT → DISTINCT → ORDER BY → TOP', code:''},
  {id:108, ch:'Triggers', front:'Tables virtuelles disponibles dans un trigger DML ?', back:'INSERTED : nouvelles valeurs (INSERT/UPDATE). DELETED : anciennes valeurs (UPDATE/DELETE). Disponibles UNIQUEMENT dans le contexte du trigger.', code:''},
  {id:109, ch:'Triggers', front:'Syntaxe d\'un trigger DDL pour loguer les DROP TABLE ?', back:'ON DATABASE, FOR DROP_TABLE, utilise EVENTDATA() pour récupérer les détails en XML.', code:'CREATE TRIGGER tr_name\nON DATABASE\nFOR DROP_TABLE\nAS BEGIN\n  DECLARE @x XML = EVENTDATA();\nEND;'},
  {id:110, ch:'Triggers', front:'Seuil de sévérité pour un rollback automatique dans un trigger AFTER ?', back:'Sévérité ≥ 19 → rollback du trigger ET de l\'action déclenchante. Sévérité < 19 → l\'action reste.', code:''},
  {id:111, ch:'Transactions', front:'Les 4 propriétés ACID ?', back:'Atomicité (tout/rien), Cohérence (état valide→valide), Isolation (transactions indépendantes), Durabilité (persiste après panne).', code:''},
  {id:112, ch:'Transactions', front:'Syntaxe complète d\'une transaction avec savepoint ?', back:'BEGIN TRANSACTION → SAVE TRANSACTION → opérations → IF erreur: ROLLBACK TRANSACTION savepoint → ELSE: COMMIT', code:'BEGIN TRANSACTION;\n  SAVE TRANSACTION sp1;\n  -- opérations\n  IF @@ERROR <> 0\n    ROLLBACK TRANSACTION sp1;\n  ELSE\n    COMMIT;'},
  {id:113, ch:'Transactions', front:'Qu\'est-ce qu\'un deadlock et comment SQL Server le gère ?', back:'Deux transactions attendent mutuellement des ressources verrouillées par l\'autre. SQL Server détecte et tue une "victime" (erreur 1205). DEADLOCK_PRIORITY influence le choix.', code:''},
  {id:114, ch:'T-SQL', front:'Syntaxe complète d\'un curseur ?', back:'DECLARE → OPEN → FETCH (avant boucle) → WHILE @@FETCH_STATUS=0 → FETCH (fin boucle) → CLOSE → DEALLOCATE', code:'DECLARE cur CURSOR FOR SELECT ...;\nOPEN cur;\nFETCH NEXT FROM cur INTO @var;\nWHILE @@FETCH_STATUS = 0\nBEGIN\n  FETCH NEXT FROM cur INTO @var;\nEND\nCLOSE cur;\nDEALLOCATE cur;'},
  {id:115, ch:'T-SQL', front:'Différence entre fonction scalaire et table-valued function ?', back:'Scalaire : RETURNS type_simple, retourne 1 valeur, appel avec dbo. Table-valued : RETURNS TABLE, retourne des lignes, utilisable dans FROM.', code:''},
  {id:116, ch:'T-SQL', front:'Syntaxe d\'une procédure avec paramètre OUTPUT ?', back:'Déclarer avec OUTPUT dans la signature. Passer avec OUTPUT lors de l\'appel. Différent de RETURN (entier uniquement).', code:'CREATE PROCEDURE sp(@val INT OUTPUT)\nAS BEGIN\n  SET @val = 42;\nEND;\n-- Appel :\nDECLARE @r INT;\nEXEC sp @val = @r OUTPUT;'},
  {id:117, ch:'T-SQL', front:'CASE forme simple vs forme recherchée ?', back:'Simple : CASE expr WHEN val THEN. Recherchée : CASE WHEN condition THEN. La forme recherchée supporte BETWEEN, IS NULL, comparaisons complexes.', code:''},
  {id:118, ch:'T-SQL', front:'@@FETCH_STATUS : valeurs possibles ?', back:'0 = ligne récupérée. -1 = fin du curseur (plus de lignes). -2 = ligne manquante. WHILE continue SEULEMENT si @@FETCH_STATUS = 0.', code:''},
  {id:119, ch:'Index', front:'Qu\'est-ce qu\'un Heap en SQL Server ?', back:'Table SANS index clustered. Lignes stockées sans ordre dans des pages. Insertion rapide, recherche = Table Scan complet (lent).', code:''},
  {id:120, ch:'Statistiques', front:'WITH RECOMPILE — rôle ?', back:'Force SQL Server à recalculer le plan d\'exécution à chaque appel. Utile quand les données changent souvent et que le plan en cache est devenu obsolète.', code:''},
  {id:121, ch:'Statistiques', front:'Index Hint WITH(INDEX(...)) ?', back:'Force l\'optimiseur à utiliser un index spécifique. Utile quand les stats sont obsolètes et que l\'optimiseur choisit un mauvais plan.', code:'SELECT * FROM EMP WITH (INDEX(idx))\nWHERE dept = \'RH\';'},
  {id:122, ch:'Vues', front:'INSTEAD OF trigger sur vue complexe — utilité ?', back:'Permet les DML sur des vues avec jointures/agrégats en redirigeant les opérations vers les tables sous-jacentes. SQL exécute le trigger AU LIEU du DML direct sur la vue.', code:''}
];

const EX = [
  {id:1, ch:'T-SQL', title:'Calculer et afficher une mention', schema:'Table: Etudiants(id INT, nom NVARCHAR(50), note DECIMAL(5,2))', desc:'Déclare une variable @note à 14.5. Utilise un bloc IF/ELSE pour afficher "Mention Bien" si note >= 14, "Mention Assez Bien" si >= 12, sinon "Ajourné".', task:'Écrire le bloc T-SQL complet avec DECLARE, SET, et IF/ELSE/IF.', sol:`DECLARE @note DECIMAL(5,2);\nSET @note = 14.5;\n\nIF @note >= 14\n    PRINT 'Mention Bien';\nELSE IF @note >= 12\n    PRINT 'Mention Assez Bien';\nELSE\n    PRINT 'Ajourné';`, note:'Les blocs IF sans BEGIN...END n\'exécutent qu\'une seule instruction. Pour plusieurs instructions, utilise BEGIN...END.'},
  {id:2, ch:'T-SQL', title:'Curseur sur les employés', schema:'Table: Employes(id INT, nom NVARCHAR(100), salaire DECIMAL(10,2), dept NVARCHAR(50))', desc:'Crée un curseur qui parcourt tous les employés du département "IT" et affiche leur nom + salaire.', task:'Écrire le code complet : DECLARE CURSOR, OPEN, FETCH, boucle WHILE, CLOSE, DEALLOCATE.', sol:`DECLARE @nom NVARCHAR(100), @salaire DECIMAL(10,2);\n\nDECLARE emp_cur CURSOR FOR\n    SELECT nom, salaire FROM Employes WHERE dept = 'IT';\n\nOPEN emp_cur;\nFETCH NEXT FROM emp_cur INTO @nom, @salaire;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT CONCAT(@nom, ' - Salaire: ', CAST(@salaire AS NVARCHAR(20)));\n    FETCH NEXT FROM emp_cur INTO @nom, @salaire;\nEND\n\nCLOSE emp_cur;\nDEALLOCATE emp_cur;`, note:'Toujours faire un FETCH avant la boucle WHILE (premier FETCH), puis un FETCH à la fin de chaque itération. Sans ça, boucle infinie.'},
  {id:3, ch:'T-SQL', title:'Fonction de calcul de TVA', schema:'Pas de table requise — fonction pure', desc:'Crée une fonction scalaire dbo.fn_CalculTVA qui prend un prix HT (DECIMAL) et retourne le prix TTC avec une TVA de 19%.', task:'Écrire CREATE FUNCTION avec les bons types de retour et l\'appel SELECT.', sol:`CREATE FUNCTION dbo.fn_CalculTVA (@prixHT DECIMAL(10,2))\nRETURNS DECIMAL(10,2)\nAS\nBEGIN\n    RETURN @prixHT * 1.19;\nEND;\nGO\n\n-- Appel\nSELECT dbo.fn_CalculTVA(100.00) AS PrixTTC;`, note:'Rappel important : les fonctions ne peuvent pas modifier les données (pas d\'INSERT/UPDATE/DELETE). Toujours préciser dbo. lors de l\'appel.'},
  {id:4, ch:'T-SQL', title:'Procédure de transfert de stock', schema:'Table: Stock(produitID INT, quantite INT, depot NVARCHAR(50))', desc:'Crée une procédure sp_TransfererStock qui transfère une quantité d\'un dépôt à un autre. Elle doit vérifier que la quantité disponible est suffisante, et retourner un code de statut (0=succès, 1=erreur).', task:'Écrire CREATE PROCEDURE avec paramètres INPUT, vérification, transaction, et RETURN.', sol:`CREATE PROCEDURE dbo.sp_TransfererStock\n    @produitID INT,\n    @depotSource NVARCHAR(50),\n    @depotDest NVARCHAR(50),\n    @quantite INT\nAS\nBEGIN\n    DECLARE @dispo INT;\n\n    SELECT @dispo = quantite FROM Stock\n    WHERE produitID = @produitID AND depot = @depotSource;\n\n    IF @dispo IS NULL OR @dispo < @quantite\n    BEGIN\n        RAISERROR('Stock insuffisant', 16, 1);\n        RETURN 1;\n    END\n\n    BEGIN TRANSACTION;\n        UPDATE Stock SET quantite = quantite - @quantite\n        WHERE produitID = @produitID AND depot = @depotSource;\n\n        UPDATE Stock SET quantite = quantite + @quantite\n        WHERE produitID = @produitID AND depot = @depotDest;\n    COMMIT;\n\n    RETURN 0;\nEND;\nGO`, note:'Une procédure avec transaction doit gérer les erreurs. En production, utilise TRY/CATCH avec ROLLBACK dans le CATCH.'},
  {id:5, ch:'Triggers', title:'Trigger de log automatique', schema:'Table: Commandes(id INT, clientID INT, montant DECIMAL, dateCmd DATE)\nTable: LogCommandes(logID INT IDENTITY, action NVARCHAR(50), montant DECIMAL, dateLog DATETIME)', desc:'Crée un trigger AFTER INSERT sur Commandes qui insère automatiquement une ligne dans LogCommandes avec l\'action "NOUVELLE COMMANDE", le montant, et GETDATE().', task:'Écrire CREATE TRIGGER AFTER INSERT avec utilisation de la table INSERTED.', sol:`CREATE TRIGGER tr_LogNouvelleCommande\nON Commandes\nAFTER INSERT\nAS\nBEGIN\n    INSERT INTO LogCommandes (action, montant, dateLog)\n    SELECT 'NOUVELLE COMMANDE', i.montant, GETDATE()\n    FROM inserted i;\nEND;\nGO`, note:'Le SELECT depuis INSERTED permet de gérer les INSERT multi-lignes (plusieurs lignes insérées en une seule commande). Évite d\'utiliser des scalaires avec SELECT TOP 1 si possible.'},
  {id:6, ch:'Triggers', title:'Protection de suppression', schema:'Table: FacturesArchives(id INT, clientID INT, montant DECIMAL, statut NVARCHAR(20))', desc:'Crée un trigger INSTEAD OF DELETE sur FacturesArchives. Au lieu de supprimer, le trigger met à jour le statut de la ligne à "SUPPRIME" et enregistre qui a tenté la suppression.', task:'Écrire le trigger INSTEAD OF DELETE avec UPDATE et SYSTEM_USER.', sol:`CREATE TRIGGER tr_ProtegerFactures\nON FacturesArchives\nINSTEAD OF DELETE\nAS\nBEGIN\n    UPDATE FacturesArchives\n    SET statut = 'SUPPRIME_PAR_' + SYSTEM_USER\n    WHERE id IN (SELECT id FROM deleted);\n\n    PRINT 'Suppression bloquée. Ligne marquée comme supprimée.';\nEND;\nGO`, note:'INSTEAD OF DELETE utilise la table DELETED (qui contient les lignes que l\'on tentait de supprimer). SYSTEM_USER retourne le nom de l\'utilisateur SQL Server connecté.'},
  {id:7, ch:'Vues', title:'Vue complexe avec jointure', schema:'Table: Employes(id INT, nom NVARCHAR(100), deptID INT, salaire DECIMAL)\nTable: Departements(id INT, nomDept NVARCHAR(50), ville NVARCHAR(50))', desc:'Crée une vue vw_EmployesDept qui affiche le nom de l\'employé, son département, sa ville, et une colonne calculée "Niveau" : "Senior" si salaire > 5000, sinon "Junior".', task:'Écrire CREATE VIEW avec jointure, CASE, et colonne calculée.', sol:`CREATE VIEW dbo.vw_EmployesDept AS\nSELECT\n    e.nom AS NomEmploye,\n    d.nomDept AS Departement,\n    d.ville AS Ville,\n    e.salaire,\n    CASE\n        WHEN e.salaire > 5000 THEN 'Senior'\n        ELSE 'Junior'\n    END AS Niveau\nFROM Employes e\nJOIN Departements d ON e.deptID = d.id;\nGO`, note:'Cette vue est complexe (jointure + colonne calculée) — les opérations DML directes ne sont pas possibles. Pour les DML, utilise un trigger INSTEAD OF.'},
  {id:8, ch:'Index', title:'Créer les bons index', schema:`Table: Commandes(id INT PK, clientID INT, dateCommande DATE, statut NVARCHAR(20), montant DECIMAL)\nRequêtes fréquentes :\n  1. SELECT * FROM Commandes WHERE clientID = 42\n  2. SELECT * FROM Commandes WHERE dateCommande BETWEEN '2024-01-01' AND '2024-12-31'\n  3. SELECT clientID, montant FROM Commandes WHERE statut = 'EN_COURS'`, desc:'Identifie et crée les index optimaux pour ces 3 requêtes. Pour la requête 3, utilise un index couvrant.', task:'Écrire les 3 CREATE INDEX adaptés.', sol:`-- Requête 1 : recherche par clientID\nCREATE NONCLUSTERED INDEX idx_Commandes_clientID\nON Commandes (clientID);\n\n-- Requête 2 : recherche par plage de dates\nCREATE NONCLUSTERED INDEX idx_Commandes_date\nON Commandes (dateCommande);\n\n-- Requête 3 : index couvrant (évite le lookup pour montant)\nCREATE NONCLUSTERED INDEX idx_Commandes_statut_cover\nON Commandes (statut)\nINCLUDE (clientID, montant);`, note:'L\'index couvrant sur la requête 3 évite que SQL Server aille chercher les colonnes clientID et montant dans la table principale. Les colonnes dans INCLUDE ne sont pas triées mais stockées dans les feuilles.'},
  {id:9, ch:'Transactions', title:'Transaction avec SAVE TRANSACTION', schema:'Table: Comptes(id INT, titulaire NVARCHAR(100), solde DECIMAL(10,2))', desc:'Écris un bloc de transaction qui transfère 500 DT du compte 1 au compte 2. Si le solde du compte 1 devient négatif, ROLLBACK jusqu\'au savepoint. Sinon, COMMIT.', task:'Utiliser BEGIN TRANSACTION, SAVE TRANSACTION, vérification, ROLLBACK / COMMIT.', sol:`BEGIN TRANSACTION;\n    SAVE TRANSACTION avant_transfert;\n\n    UPDATE Comptes SET solde = solde - 500 WHERE id = 1;\n    UPDATE Comptes SET solde = solde + 500 WHERE id = 2;\n\n    IF (SELECT solde FROM Comptes WHERE id = 1) < 0\n    BEGIN\n        ROLLBACK TRANSACTION avant_transfert;\n        PRINT 'Solde insuffisant — transfert annulé';\n    END\n    ELSE\n    BEGIN\n        COMMIT;\n        PRINT 'Transfert effectué avec succès';\n    END`, note:'ROLLBACK TRANSACTION NomSave revient au savepoint sans annuler toute la transaction. Ici, on pourrait continuer d\'autres opérations après le ROLLBACK partiel.'},
  {id:10, ch:'Triggers', title:'Trigger DDL d\'audit', schema:'Table: AuditStructure(id INT IDENTITY, evenement NVARCHAR(100), objet NVARCHAR(200), utilisateur NVARCHAR(100), dateEvenement DATETIME)', desc:'Crée un trigger DDL qui logue dans AuditStructure chaque CREATE_TABLE et DROP_TABLE avec le type d\'événement, le nom de l\'objet, l\'utilisateur, et la date.', task:'Écrire CREATE TRIGGER ON DATABASE avec EVENTDATA() et INSERT dans la table d\'audit.', sol:`CREATE TRIGGER tr_AuditStructure\nON DATABASE\nFOR CREATE_TABLE, DROP_TABLE\nAS\nBEGIN\n    DECLARE @xml XML = EVENTDATA();\n\n    INSERT INTO AuditStructure (evenement, objet, utilisateur, dateEvenement)\n    VALUES (\n        @xml.value('(/EVENT_INSTANCE/EventType)[1]', 'nvarchar(100)'),\n        @xml.value('(/EVENT_INSTANCE/ObjectName)[1]', 'nvarchar(200)'),\n        @xml.value('(/EVENT_INSTANCE/LoginName)[1]', 'nvarchar(100)'),\n        GETDATE()\n    );\nEND;\nGO`, note:'EVENTDATA() retourne un XML. La syntaxe .value(\'(/EVENT_INSTANCE/Tag)[1]\', \'type\') extrait une valeur du XML. Le [1] sélectionne le premier nœud.'},
  {id:11, ch:'Vues', title:'🏫 Examen — Fonction de disponibilité de salle', schema:'Salles(SalleID INT PK IDENTITY, NomSalle NVARCHAR(100), Capacite INT, Disponible BIT)\nReservations(ReservationID INT PK IDENTITY, SalleID INT FK, Formateur NVARCHAR(100), DateDebut DATE, DateFin DATE)', desc:'Question 1 de l\'examen Gestion des Salles. Crée une fonction qui vérifie si une salle est disponible pour une période donnée. Retourne 1 si disponible, 0 sinon.', task:'CREATE FUNCTION dbo.fn_SalleDisponible avec 3 params : @SalleID INT, @DateDebut DATE, @DateFin DATE. RETURNS INT.', sol:`CREATE FUNCTION dbo.fn_SalleDisponible\n(@SalleID INT, @DateDebut DATE, @DateFin DATE)\nRETURNS INT\nAS\nBEGIN\n    DECLARE @dispo INT;\n    SELECT @dispo = S.Disponible\n    FROM Salles S\n    JOIN Reservations R ON S.SalleID = R.SalleID\n    WHERE S.SalleID = @SalleID;\n    RETURN ISNULL(@dispo, 0);\nEND;\nGO`, note:'Note pédagogique : dans le code original de l\'exam, le curseur était déclaré EN DEHORS de la fonction — ce qui est invalide en T-SQL. Un curseur n\'est pas nécessaire ici.'},
  {id:12, ch:'T-SQL', title:'🏫 Examen — Procédure de réservation de salle', schema:'Même schéma que l\'exercice 11', desc:'Question 2. Crée une procédure qui vérifie si la salle existe, appelle fn_SalleDisponible, et insère la réservation si disponible. Utilise RAISERROR si la salle n\'existe pas.', task:'CREATE PROCEDURE dbo.sp_ReserverSalle avec 4 paramètres : @SalleID, @Formateur, @DateDebut, @DateFin.', sol:`CREATE PROCEDURE dbo.sp_ReserverSalle\n    @SalleID INT,\n    @Formateur NVARCHAR(100),\n    @DateDebut DATE,\n    @DateFin DATE\nAS\nBEGIN\n    DECLARE @boop INT, @dispo INT;\n\n    SELECT @boop = COUNT(*) FROM Salles WHERE SalleID = @SalleID;\n\n    IF @boop = 0\n        RAISERROR('La salle n\'existe pas', 16, 1);\n    ELSE\n        PRINT('La salle est trouvable');\n\n    SELECT @dispo = dbo.fn_SalleDisponible(@SalleID, @DateDebut, @DateFin);\n\n    IF @dispo = 1\n        PRINT('La salle est disponible');\n    ELSE\n        PRINT('La salle n\'est pas disponible');\n\n    IF @boop = 1 AND @dispo = 1\n        INSERT INTO Reservations(SalleID, Formateur, DateDebut, DateFin)\n        VALUES (@SalleID, @Formateur, @DateDebut, @DateFin);\nEND;\nGO`, note:'Piège de l\'exam original : le @Formateur manquait dans le INSERT VALUES. Toujours vérifier que tous les paramètres sont passés dans l\'INSERT.'},
  {id:13, ch:'Vues', title:'🏫 Examen — Vue des salles libres aujourd\'hui', schema:'Même schéma que l\'exercice 11', desc:'Question 3. Crée une vue qui affiche les salles non réservées à la date d\'aujourd\'hui (GETDATE()).', task:'CREATE VIEW dbo.vw_SallesLibresAujourdHui. Utilise GETDATE() et NOT BETWEEN.', sol:`CREATE VIEW dbo.vw_SallesLibresAujourdHui AS\nSELECT S.SalleID, S.NomSalle\nFROM Salles S\nJOIN Reservations R ON S.SalleID = R.SalleID\nWHERE GETDATE() NOT BETWEEN R.DateDebut AND R.DateFin;\nGO`, note:'Note : cette vue est complexe (jointure). Les DML directs ne sont pas possibles. Pour les DML, il faudrait un trigger INSTEAD OF.'},
  {id:14, ch:'Index', title:'🏫 Examen — Index Non-Clusterisé sur Reservations', schema:'Table: Reservations(ReservationID INT PK, SalleID INT FK, Formateur NVARCHAR(100), DateDebut DATE, DateFin DATE)', desc:'Question 4. Crée un index Non-Clusterisé sur la colonne DateDebut de la table Reservations pour optimiser les recherches par date.', task:'CREATE NONCLUSTERED INDEX avec un nom explicite.', sol:`CREATE NONCLUSTERED INDEX question4_index\nON Reservations(DateDebut);\nGO`, note:'Commentaire des notes : "Ce type d\'index est un index virtuel qui pointe vers les données physiques. Utilisé dans le cas des données de taille volumineuse et des données à forte fréquence d\'être insérées ou modifiées."'},
  {id:15, ch:'Triggers', title:'🏫 Examen — Trigger vérification capacité (bugué !)', schema:'Table: Salles(SalleID INT PK IDENTITY, NomSalle NVARCHAR(100), Capacite INT, Disponible BIT)', desc:'Question 5 — ⚠️ ATTENTION : ce trigger est RÉCURSIF car il fait un INSERT INTO Salles alors qu\'il se déclenche AFTER INSERT sur Salles ! Analyse le bug et comprends pourquoi c\'est dangereux.', task:'Analyser le trigger et expliquer le bug de récursion. Puis écrire une version corrigée sans INSERT INTO Salles dans le trigger.', sol:`-- VERSION ORIGINALE (BUGGUÉE — RÉCURSIVE) :\nCREATE TRIGGER tr_VerifierCapacite\nON Salles\nAFTER INSERT\nAS BEGIN\n    DECLARE @Capacite INT, @NOM NVARCHAR(100), @existe INT;\n    SELECT @Capacite = i.Capacite, @NOM = i.NomSalle FROM inserted i;\n    SELECT @existe = COUNT(*) FROM Salles S JOIN inserted i ON S.NomSalle = i.NomSalle;\n    IF @Capacite >= 8 AND @existe = 0\n        INSERT INTO Salles VALUES (@NOM, @Capacite, 1); -- RÉCURSION ICI !\n    ELSE\n        RAISERROR('Conditions non vérifiées', 16, 1);\nEND;\n\n-- VERSION CORRIGÉE (sans INSERT INTO Salles) :\nCREATE TRIGGER tr_VerifierCapacite_V2\nON Salles\nAFTER INSERT\nAS BEGIN\n    IF EXISTS (SELECT 1 FROM inserted WHERE Capacite < 8)\n    BEGIN\n        RAISERROR('Capacite minimale = 8', 16, 1);\n        ROLLBACK;\n    END\nEND;\nGO`, note:'⚠️ Bug classique : un trigger AFTER INSERT sur TableX qui fait INSERT INTO TableX = récursion. SQL Server limite à 32 niveaux de récursion puis génère une erreur fatale.'},
  {id:16, ch:'T-SQL', title:'🏫 Examen — Curseur sur les capacités', schema:'Table: Salles(SalleID INT PK, NomSalle NVARCHAR(100), Capacite INT, Disponible BIT)', desc:'Question 6. Crée un curseur qui parcourt la colonne Capacite de la table Salles et affiche chaque valeur.', task:'Écrire le curseur complet : DECLARE, OPEN, FETCH, WHILE @@FETCH_STATUS=0, CLOSE, DEALLOCATE.', sol:`DECLARE question6_cur CURSOR\nFOR SELECT Capacite FROM Salles;\n\nDECLARE @capacity INT;\nOPEN question6_cur;\nFETCH NEXT FROM question6_cur INTO @capacity;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT (@capacity);\n    FETCH NEXT FROM question6_cur INTO @capacity;\nEND;\n\nCLOSE question6_cur;\nDEALLOCATE question6_cur;`, note:'Rappel : le DECLARE de @capacity doit être AVANT OPEN dans ce contexte car il est utilisé dans FETCH. Toujours faire un FETCH avant la boucle WHILE.'},
  {id:17, ch:'Triggers', title:'🏫 Examen — Trigger INSTEAD OF DELETE (Bonus)', schema:'Table: Reservations(ReservationID INT PK, SalleID INT FK, Formateur NVARCHAR(100), DateDebut DATE, DateFin DATE)', desc:'Question 7 (Bonus). Crée un trigger qui empêche toute suppression sur la table Reservations. Affiche un message d\'erreur avec RAISERROR.', task:'CREATE TRIGGER INSTEAD OF DELETE qui bloque la suppression.', sol:`CREATE TRIGGER Bonus_quest\nON RESERVATIONS\nINSTEAD OF DELETE\nAS\nBEGIN\n    RAISERROR('C\'est interdit de supprimer sur cette table, attention !', 16, 1);\nEND;\nGO`, note:'INSTEAD OF DELETE : SQL Server exécute le trigger AU LIEU du DELETE. Aucune ligne n\'est supprimée. La table DELETED contient les lignes que l\'utilisateur voulait supprimer.'}
];

/* === STATE === */
const ST={
  qcm:{idx:0,answers:{},bookmarks:{},mode:'all',chapter:'all',timer:null,sec:0,running:false,shuffled:[]},
  fc:{idx:0,states:{},chapter:'all',shuffled:[]},
  ex:{completed:{}},
  search:'',
  streak:0,
  lastActive:'',
  load(){try{const s=localStorage.getItem('tsql_state');if(s){const d=JSON.parse(s);this.qcm.answers=d.qa||{};this.qcm.bookmarks=d.bk||{};this.fc.states=d.fs||{};this.ex.completed=d.ec||{};this.streak=d.str||0;this.lastActive=d.la||'';}}catch(e){}},
  save(){try{localStorage.setItem('tsql_state',JSON.stringify({qa:this.qcm.answers,bk:this.qcm.bookmarks,fs:this.fc.states,ec:this.ex.completed,str:this.streak,la:this.lastActive}))}catch(e){}}
};
ST.load();

function updateStreak(){
  const today=new Date().toLocaleDateString('en-CA');
  if(!ST.lastActive){
    ST.streak=1;ST.lastActive=today;ST.save();
  }else if(ST.lastActive!==today){
    const last=new Date(ST.lastActive);
    const now=new Date(today);
    const diffDays=Math.floor((now-last)/(1000*60*60*24));
    if(diffDays===1){ST.streak++;}else if(diffDays>1){ST.streak=1;}
    ST.lastActive=today;ST.save();
  }
  document.getElementById('streak-val').textContent=ST.streak;
}

/* === TAB ROUTER === */
function toggleSidebar(){
  document.querySelector('.nav-tabs').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      if(window.innerWidth<=850 && document.querySelector('.nav-tabs').classList.contains('open')) toggleSidebar();
      document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('tab-'+b.dataset.tab).classList.add('active');
      if(b.dataset.tab==='qcm') renderQCM();
      if(b.dataset.tab==='flashcards') renderFC();
      if(b.dataset.tab==='cheatsheet') renderCS();
      if(b.dataset.tab==='exercices') renderEx();
    });
  });
}
